name: Deploy Discord Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # This tells GitHub to use your local Ubuntu server

    steps:
      - name: Pull Latest Code and Restart
        run: |
          cd /path/to/your/bot/directory
          git reset --hard HEAD
          git pull origin main
          sudo systemctl restart discord-bot
